name: CI

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: CI-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint Test Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24, 26]
      fail-fast: false
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect secrets
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          report-path: results-${{ github.run_number }}.sarif
          artifact-name: gitleaks-report-${{ github.run_number }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx biome check . --reporter=github

      - name: Type checking
        run: bun run type-check

      - name: Run tests
        run: bun run test

      - name: Generate coverage
        run: bun run test:coverage

      - name: Build TypeScript
        run: bun run build

      - name: Test Docker build (no push)
        run: |
          echo "Testing Docker build..."
          docker build -t test-build .
          echo "Build successful, cleaning up..."
          docker image rm test-build
          echo "Docker build test completed"
