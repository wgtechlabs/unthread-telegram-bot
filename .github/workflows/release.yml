name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: Release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    permissions:
      contents: read

  codeql:
    name: CodeQL Gate
    uses: ./.github/workflows/codeql.yml
    permissions:
      contents: read
      security-events: write
      actions: read

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ci, codeql]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        id: release
        uses: wgtechlabs/release-build-flow-action@v1.7.0
        with:
          # Use GH_PAT to allow downstream release-triggered workflows.
          github-token: ${{ secrets.GH_PAT }}
          commit-convention: clean-commit

      - name: Release summary
        if: steps.release.outputs.version-bump-type != 'none'
        run: |
          echo "Version: ${{ steps.release.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: ${{ steps.release.outputs.version-tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.release.outputs.release-url }}" >> "$GITHUB_STEP_SUMMARY"
