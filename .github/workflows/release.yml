name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: Release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    permissions:
      contents: read

  codeql:
    name: CodeQL Gate
    uses: ./.github/workflows/codeql.yml
    permissions:
      contents: read
      security-events: write
      actions: read

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ ci, codeql ]
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify GH_PAT is set
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::GH_PAT secret is required."
            exit 1
          fi

      - name: Create Release
        id: release
        uses: wgtechlabs/release-build-flow-action@v1.7.0
        with:
          github-token: ${{ secrets.GH_PAT }}
          commit-convention: clean-commit
