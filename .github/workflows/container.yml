name: Container Build

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: Container-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    permissions:
      contents: read

  codeql:
    name: CodeQL Gate
    uses: ./.github/workflows/codeql.yml
    permissions:
      contents: read
      security-events: write
      actions: read

  build:
    name: Build Container Images
    runs-on: ubuntu-latest
    needs: [ci, codeql]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Dockerfile
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Dockerfile not found. Skipping container build." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build and push container
        if: steps.dockerfile.outputs.exists == 'true'
        uses: wgtechlabs/container-build-flow-action@v1.8.0
        with:
          registry: both
          dockerhub-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          ghcr-token: ${{ github.token }}
          floating-tags: true
          pre-build-scan-enabled: false
          image-scan-enabled: false
          upload-sarif: false
          vulnerability-comment-enabled: false
